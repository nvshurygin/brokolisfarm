<div class="bf-page bf-page_static" data-bf-app>
  {{BF_HEADER}}

  <section class="bf-page-hero">
    <div class="bf-shell bf-page-hero__inner">
      <div>
        <span class="bf-kicker">Связаться</span>
        <h1>Контакты</h1>
        <p>Напишите или позвоните нам, если хотите уточнить наличие продуктов, доставку или состав заказа.</p>
      </div>
    </div>
  </section>

  <section class="bf-section bf-contact-page">
    <div class="bf-shell bf-contact-page__grid">
      <div class="bf-contact-list">
        <a href="tel:+499939930033">+49 (993) 993-003-3</a>
        <a href="mailto:hello@brokolisfarm.lv">hello@brokolisfarm.lv</a>
        <p>Латвия</p>
        <p>Доставка: среда-суббота, 16:00-23:00</p>
      </div>
      <form class="bf-contact-form">
        <label class="bf-field">
          <span>Имя</span>
          <input type="text" name="name" />
        </label>
        <label class="bf-field">
          <span>Телефон или email</span>
          <input type="text" name="contact" />
        </label>
        <label class="bf-field">
          <span>Сообщение</span>
          <textarea name="message" rows="5"></textarea>
        </label>
        <button class="bf-button" type="submit">Отправить</button>
      </form>
    </div>
  </section>

  {{BF_FOOTER}}
</div>
