<div
  class="bf-page bf-page_catalog"
  data-bf-app
  data-storepartuid="420955341102"
  data-recid="2176935951"
  data-products-size="36"
>
  {{BF_HEADER}}

  <section class="bf-page-hero">
    <div class="bf-shell bf-page-hero__inner">
      <div>
        <span class="bf-kicker">Katalogs</span>
        <h1>Svaigi BrokolisFarm produkti</h1>
        <p>Izvēlieties gaļu, delikateses, piena produktus, augļus, dārzeņus un gatavās izlases ar ērtu piegādi mājās.</p>
      </div>
    </div>
  </section>

  <section class="bf-section bf-catalog-page" id="catalog">
    <div class="bf-shell">
      <div class="bf-catalog-toolbar" id="search">
        <label class="bf-field">
          <span>Meklēšana</span>
          <input type="search" placeholder="Nosaukums, SKU vai apraksts" data-bf-search />
        </label>
        <label class="bf-field">
          <span>Kārtošana</span>
          <select data-bf-sort>
            <option value="">Pēc noklusējuma</option>
            <option value="price:asc">Sākumā lētākās</option>
            <option value="price:desc">Sākumā dārgākās</option>
            <option value="title:asc">Nosaukums A-Z</option>
            <option value="title:desc">Nosaukums Z-A</option>
          </select>
        </label>
      </div>
      <div class="bf-store-parts bf-store-parts_left" data-bf-parts hidden></div>
      <div class="bf-products bf-products_catalog" data-bf-products aria-live="polite">
        <div class="bf-products__status">Ielādējam preces...</div>
      </div>
      <button class="bf-load-more" type="button" data-bf-load-more hidden>Rādīt vēl</button>
    </div>
  </section>

  {{BF_FOOTER}}
</div>
