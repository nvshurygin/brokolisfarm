  function ready(callback) {
    if (document.readyState === "loading") {

  function ensureStandaloneHeaderMount(templates, mountAttribute, headerClass) {
    if (!templates.header) return null;
    var headerMount = document.querySelector("[" + mountAttribute + "]");
    if (!headerMount) {
      headerMount = document.createElement("div");
      headerMount.setAttribute(mountAttribute, "true");
      var tildaHeader = document.getElementById("t-header");
      var allrecords = document.getElementById("allrecords");
      var anchor = tildaHeader || allrecords || document.body.firstChild;
      if (anchor && anchor.parentNode) {
        anchor.parentNode.insertBefore(headerMount, anchor);
      } else {
        document.body.insertBefore(headerMount, document.body.firstChild);
      }
    }
    if (headerMount.getAttribute("data-bf-rendered") !== "true") {
      headerMount.innerHTML = templates.header;
      headerMount.setAttribute("data-bf-rendered", "true");
    }
    if (headerClass) headerMount.classList.add(headerClass);
    return headerMount;
  }

  function renderCommonChrome() {
    var templates = window.BrokolisFarmTemplates || {};
    if (templates.header) {
      toArray(document.querySelectorAll("[data-bf-header]")).forEach(function (mount) {
        if (!mount.getAttribute("data-bf-rendered")) {
          mount.innerHTML = templates.header;
          mount.setAttribute("data-bf-rendered", "true");
        }
      });
    }
    if (templates.footer) {
      toArray(document.querySelectorAll("[data-bf-footer]")).forEach(function (mount) {
        if (!mount.getAttribute("data-bf-rendered")) {
          mount.innerHTML = templates.footer;
          mount.setAttribute("data-bf-rendered", "true");
        }
      });
    }
  }

  function isMobileMenuViewport() {
    return !window.matchMedia || window.matchMedia("(max-width: 960px)").matches;
  }

  function openMobileMenu(menu, toggle) {
    menu.classList.add("is-open");
    menu.setAttribute("aria-hidden", "false");
    document.body.classList.add("bf-mobile-menu-open");
    if (toggle) toggle.setAttribute("aria-expanded", "true");
  }

  function closeMobileMenu(menu, toggle) {
    menu.classList.remove("is-open");
    menu.setAttribute("aria-hidden", "true");
    document.body.classList.remove("bf-mobile-menu-open");
    if (toggle) toggle.setAttribute("aria-expanded", "false");
  }

  function bindMobileMenu() {
    toArray(document.querySelectorAll("[data-bf-mobile-menu]")).forEach(function (menu) {
      if (menu.getAttribute("data-bf-menu-bound") === "true") return;
      var toggle = document.querySelector('[data-bf-menu-toggle][aria-controls="' + menu.id + '"]');
      if (!toggle) return;
      menu.setAttribute("data-bf-menu-bound", "true");

      toggle.addEventListener("click", function (event) {
        if (!isMobileMenuViewport()) return;
        event.preventDefault();
        if (menu.classList.contains("is-open")) {
          closeMobileMenu(menu, toggle);
        } else {
          openMobileMenu(menu, toggle);
        }
      });

      toArray(menu.querySelectorAll("[data-bf-menu-close]")).forEach(function (closeButton) {
        closeButton.addEventListener("click", function () {
          closeMobileMenu(menu, toggle);
        });
      });

      toArray(menu.querySelectorAll("a")).forEach(function (link) {
        link.addEventListener("click", function () {
          closeMobileMenu(menu, toggle);
        });
      });

      document.addEventListener("keydown", function (event) {
        if (event.key === "Escape" && menu.classList.contains("is-open")) {
          closeMobileMenu(menu, toggle);
        }
      });

      if (window.matchMedia) {
        var media = window.matchMedia("(max-width: 960px)");
        var onChange = function (event) {
          if (!event.matches) closeMobileMenu(menu, toggle);
        };
        if (media.addEventListener) {
          media.addEventListener("change", onChange);
        } else if (media.addListener) {
          media.addListener(onChange);
        }
      }
    });
  }

  function updateStickyHeaderState() {
    var isScrolled = (window.pageYOffset || document.documentElement.scrollTop || 0) > 6;
    toArray(document.querySelectorAll(".bf-header")).forEach(function (header) {
      header.classList.toggle("is-scrolled", isScrolled);
    });
  }

  function bindStickyHeader() {
    if (document.documentElement.getAttribute("data-bf-sticky-header-bound") !== "true") {
      document.documentElement.setAttribute("data-bf-sticky-header-bound", "true");
      window.addEventListener("scroll", updateStickyHeaderState, { passive: true });
      window.addEventListener("resize", updateStickyHeaderState);
    }
    updateStickyHeaderState();
  }

  function countCartProducts(cart) {
    if (!cart || !Array.isArray(cart.products)) return null;
    return cart.products.reduce(function (total, product) {
      if (!product || product.deleted === "yes") return total;
      if (product.single === "y") return total + 1;
      return total + (Number(product.quantity) || 0);
    }, 0);
  }

  function getStoredCartTotal() {
    if (window.tcart) {
      var windowCount = countCartProducts(window.tcart);
      if (windowCount !== null) return windowCount;
      if (typeof window.tcart.total !== "undefined") return Number(window.tcart.total) || 0;
    }
    if (typeof localStorage === "undefined") return 0;
    try {
      var stored = JSON.parse(localStorage.getItem("tcart") || "{}");
      var storedCount = countCartProducts(stored);
      if (storedCount !== null) return storedCount;
      if (typeof stored.total !== "undefined") return Number(stored.total) || 0;
    } catch (error) {
      return 0;
    }
    return 0;
  }

  function ensureMinimalTildaCartHost() {
    if (document.querySelector(".t706")) return;
    var host = document.createElement("div");
    host.className = "t706 bf-tilda-cart-host";
    host.setAttribute("data-opencart-onorder", "");
    host.setAttribute("data-project-currency", "€");
    host.setAttribute("data-project-currency-side", "l");
    host.setAttribute("data-project-currency-sep", ",");
    host.setAttribute("data-project-currency-dec", "00");
    host.setAttribute("aria-hidden", "true");
    var allrecords = document.getElementById("allrecords");
    (allrecords || document.body).appendChild(host);
  }

  function ensureTcartObject() {
    var cart = window.tcart;
    if (!cart && typeof localStorage !== "undefined") {
      try {
        cart = JSON.parse(localStorage.getItem("tcart") || "null");
      } catch (error) {
        cart = null;
      }
    }
    if (!cart || typeof cart !== "object") cart = {};
    if (!Array.isArray(cart.products)) cart.products = [];
    if (!cart.currency) cart.currency = "€";
    if (!cart.currency_txt) cart.currency_txt = "€";
    if (!cart.currency_txt_l) cart.currency_txt_l = "€";
    if (!cart.currency_side) cart.currency_side = "l";
    if (!cart.currency_sep) cart.currency_sep = ",";
    if (!cart.currency_dec) cart.currency_dec = "00";
    window.tcart = cart;
    return cart;
  }

  function sameCartProduct(a, b) {
    if (!a || !b) return false;
    if (a.uid && b.uid && String(a.uid) === String(b.uid)) return true;
    return a.sku && b.sku && String(a.sku) === String(b.sku);
  }

  function recalcAndSaveTcart(cart) {
    var products = Array.isArray(cart.products) ? cart.products : [];
    var totalQty = 0;
    var totalAmount = 0;
    products.forEach(function (product) {
      if (!product || product.deleted === "yes") return;
      var qty = Number(product.quantity) || 0;
      var price = Number(product.price) || 0;
      product.amount = Math.round(price * qty * 100) / 100;
      totalQty += qty;
      totalAmount += product.amount;
    });
    cart.total = totalQty;
    cart.prodamount = Math.round(totalAmount * 100) / 100;
    cart.amount = cart.prodamount;
    cart.updated = Math.floor(Date.now() / 1000);
    try {
      localStorage.setItem("tcart", JSON.stringify(cart));
    } catch (error) {}
  }

  function addProductToLocalTcart(productData) {
    var cart = ensureTcartObject();
    var quantity = Number(productData.quantity) || 1;
    var existing = cart.products.find(function (product) {
      return sameCartProduct(product, productData);
    });
    if (existing) {
      existing.quantity = (Number(existing.quantity) || 0) + quantity;
    } else {
      productData.quantity = quantity;
      productData.amount = Math.round((Number(productData.price) || 0) * quantity * 100) / 100;
      productData.ts = Math.floor(Date.now() / 1000);
      cart.products.push(productData);
    }
    recalcAndSaveTcart(cart);
    syncCustomCartCounter();
    return true;
  }

  function syncCustomCartCounter() {
    var total = getStoredCartTotal();
    toArray(document.querySelectorAll("[data-bf-cart-count]")).forEach(function (counter) {
      counter.textContent = total > 0 ? String(total) : "";
    });
  }

  var nativeCartPromise = null;

  function getNativeTildaCartRecord() {
    var cart = document.querySelector(".t706:not(.bf-tilda-cart-host)");
    if (!cart) {
      TILDA_CART_RECORD_IDS.some(function (recordId) {
        cart = document.querySelector("#rec" + recordId + " .t706");
        return !!cart;
      });
    }
    if (!cart) return null;
    var record = cart.closest(".r[id^='rec']");
    var recordId = record ? record.id.replace("rec", "") : "";
    return { cart: cart, record: record, recordId: recordId };
  }

  function hasNativeTildaCartWindow() {
    var nativeCart = getNativeTildaCartRecord();
    return !!(nativeCart && nativeCart.cart.querySelector(".t706__cartwin, .t706__sidebar, .t706__cartpage"));
  }

  function removeMinimalTildaCartHost() {

      if (host.parentNode) host.parentNode.removeChild(host);

  function deliveryPriceLabel(price) {
    var value = normalizePrice(price);
    return value ? "€ " + value : "Bez maksas";
  }

  function getStoredDeliveryZoneId() {
    try {
      var value = localStorage.getItem(BF_DELIVERY_STORAGE_KEY);
      if (BF_DELIVERY_ZONES.some(function (zone) { return zone.id === value; })) return value;
    } catch (error) {}
    return "";
  }

  function getStoredDeliveryPoint() {
    try {
      var value = parseJson(localStorage.getItem(BF_DELIVERY_POINT_STORAGE_KEY), null);
      if (value && Number.isFinite(Number(value.lat)) && Number.isFinite(Number(value.lng))) {
        return {
          lat: Number(value.lat),
          lng: Number(value.lng)
        };
      }
    } catch (error) {}
    return null;
  }

  function storeDeliveryPoint(point) {
    try {
      if (!point) {
        localStorage.removeItem(BF_DELIVERY_POINT_STORAGE_KEY);
        return;
      }
      localStorage.setItem(BF_DELIVERY_POINT_STORAGE_KEY, JSON.stringify({
        lat: Number(point.lat),
        lng: Number(point.lng)
      }));
    } catch (error) {}
  }

  function deliveryPointInSearchBounds(point) {
    return !!(point &&
      point.lat >= BF_DELIVERY_SEARCH_BOUNDS.minLat &&
      point.lat <= BF_DELIVERY_SEARCH_BOUNDS.maxLat &&
      point.lng >= BF_DELIVERY_SEARCH_BOUNDS.minLng &&
      point.lng <= BF_DELIVERY_SEARCH_BOUNDS.maxLng);
  }

  function deliveryPointInPolygon(point, polygon) {
    if (!point || !Array.isArray(polygon) || polygon.length < 3) return false;
    var inside = false;
    var x = Number(point.lng);
    var y = Number(point.lat);
    for (var index = 0, previous = polygon.length - 1; index < polygon.length; previous = index++) {
      var xi = Number(polygon[index][1]);
      var yi = Number(polygon[index][0]);
      var xj = Number(polygon[previous][1]);
      var yj = Number(polygon[previous][0]);
      var intersects = ((yi > y) !== (yj > y)) &&
        (x < ((xj - xi) * (y - yi)) / ((yj - yi) || 0.000001) + xi);
      if (intersects) inside = !inside;
    }
    return inside;
  }

  function deliveryZoneForPoint(point, preferredZoneId) {

    if (preferredZoneId) {
      var preferredZone = zones.find(function (zone) { return zone.id === preferredZoneId; });
      if (preferredZone) return preferredZone;
    }
    return zones.reduce(function (bestZone, zone) {
      var bestPrice = Number(bestZone && bestZone.price) || 0;
      var zonePrice = Number(zone && zone.price) || 0;
      if (zonePrice > bestPrice) return zone;
      if (zonePrice === bestPrice && BF_DELIVERY_ZONES.indexOf(zone) > BF_DELIVERY_ZONES.indexOf(bestZone)) return zone;
      return bestZone;
    }, zones[0]);

  function renderLeafletDeliveryMap(mapMount, selectedZoneId, onSelect, onPointSelect, selectedPoint) {
    loadLeaflet()
      .then(function (L) {
        if (!mapMount || mapMount.getAttribute("data-bf-leaflet-ready") === "true") {

  function productIdentityValues(product) {
    var ids = [];

    if (product.uid) ids.push(String(product.uid));

    setTimeout(function () {

        window.dispatchEvent(new Event("resize"));
      } catch (error) {
        var event = document.createEvent("UIEvents");
        event.initUIEvent("resize", true, false, window, 0);
        window.dispatchEvent(event);
      }
    }, 0);

    if (scheduleRetries === false || document.documentElement.getAttribute("data-bf-product-page-retries") === "true") return;
    document.documentElement.setAttribute("data-bf-product-page-retries", "true");
    [350, 1200, 2800].forEach(function (delay) {
      setTimeout(function () {
        ensureTildaProductPage(false);
        bindMobileMenu();
        bindStickyHeader();
        bindCartBridge();
      }, delay);
    });
  }

  function normalizePrice(value) {
    if (value == null || value === "") return "";
    var number = Number(String(value).replace(",", "."));
    if (!Number.isFinite(number)) return "";
    return number.toFixed(number % 1 === 0 ? 0 : 2);
  }

  function money(value, currency) {
    var price = normalizePrice(value);
    return price ? currency + price : "";
  }

  function getGallery(product) {
    var gallery = parseJson(product.gallery, []);
    return Array.isArray(gallery) ? gallery : [];
  }

  function getProductImage(product, edition) {
    if (edition && edition.img) return edition.img;
    var gallery = getGallery(product);
    return gallery[0] && gallery[0].img ? gallery[0].img : "";
  }

  function getPartUids(product) {
    var value = parseJson(product.partuids, []);
    return Array.isArray(value) ? value : [];
  }

  function isAvailable(edition) {
    return !edition || edition.quantity === "" || edition.quantity == null || Number(edition.quantity) > 0;
  }

  function firstAvailableEdition(product) {
    var editions = Array.isArray(product.editions) ? product.editions : [];
    return editions.find(isAvailable) || editions[0] || {
      uid: product.uid,
      price: product.price,
      priceold: product.priceold,
      sku: product.sku,
      quantity: product.quantity,
      img: getProductImage(product)
    };
  }

  function getEditionOptions(product) {
    var options = parseJson(product.json_options, []);
    if (!Array.isArray(options) || options.length === 0) {
      var editions = Array.isArray(product.editions) ? product.editions : [];
      var ignored = {
        uid: true,
        externalid: true,
        sku: true,
        price: true,
        priceold: true,
        quantity: true,
        img: true
      };
      var names = [];
      editions.forEach(function (edition) {
        Object.keys(edition || {}).forEach(function (key) {
          if (!ignored[key] && names.indexOf(key) === -1) names.push(key);
        });
      });
      return names.map(function (name) {
        return {
          title: name,
          values: editions.map(function (edition) {
            return edition[name];
          }).filter(Boolean)
        };
      });
    }
    return options.map(function (option) {
      return {
        title: option.title,
        values: Array.isArray(option.values) ? option.values : []
      };
    });
  }

  function unique(values) {
    return values.filter(function (value, index) {
      return value && values.indexOf(value) === index;
    });
  }

  function findEditionBySelections(product, selections) {
    var editions = Array.isArray(product.editions) ? product.editions : [];
    return editions.find(function (edition) {
      return Object.keys(selections).every(function (name) {
        return !selections[name] || edition[name] === selections[name];
      });
    }) || firstAvailableEdition(product);
  }

  function buildApiUrl(root, state, slice) {
    var params = new URLSearchParams();
    params.set("storepartuid", state.activePartUid || state.rootPartUid || root.getAttribute("data-storepartuid") || "");
    params.set("recid", root.getAttribute("data-recid") || DEFAULT_RECID);
    params.set("c", String(Date.now()));
    params.set("getparts", "true");
    params.set("getoptions", "true");
    params.set("slice", String(slice || 1));
    params.set("size", root.getAttribute("data-products-size") || "36");
    params.set("flag_root", "withroot");
    return (root.getAttribute("data-api") || DEFAULT_API) + "?" + params.toString();
  }

  function requestJson(url) {
    return new Promise(function (resolve, reject) {
      if (typeof XMLHttpRequest !== "undefined") {
        var xhr = new XMLHttpRequest();
        xhr.open("GET", url, true);
        xhr.timeout = 20000;
        xhr.onload = function () {
          if (xhr.status < 200 || xhr.status >= 300) {
            reject(new Error("Catalog request failed: " + xhr.status));
            return;
          }
          try {
            resolve(JSON.parse(xhr.responseText));
          } catch (error) {
            reject(error);
          }
        };
        xhr.onerror = function () {
          reject(new Error("Catalog request failed"));
        };
        xhr.ontimeout = function () {
          reject(new Error("Catalog request timed out"));
        };
        xhr.send();
        return;
      }

      if (typeof fetch === "function") {
        fetch(url, {
          method: "GET",
          credentials: "omit"
        })
          .then(function (response) {
            if (!response.ok) throw new Error("Catalog request failed: " + response.status);
            return response.json();
          })
          .then(resolve)
          .catch(reject);
        return;
      }

      reject(new Error("No request API is available"));
    });
  }

  function getLocalFallbackData() {
    var host = window.location && window.location.hostname;
    if (host === "127.0.0.1" || host === "localhost") {
      return LOCAL_FALLBACK_DATA;
    }
    return null;
  }

  function partTitle(part) {
    return part.title || part.path && part.path.join(" / ") || "Kategorija";
  }

  function normalizeCategoryKey(value) {
    var text = String(value || "");
    if (text.normalize) {
      text = text.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }
    return text.toLowerCase().replace(/[^a-z0-9а-яё]+/g, " ").trim();
  }

  function requestedCategoryKey(root) {
    var params = new URLSearchParams(window.location.search || "");
    return root.getAttribute("data-bf-default-category") || params.get("category") || params.get("part") || "";
  }

  function findPartByCategory(parts, value) {
    var target = normalizeCategoryKey(value);
    if (!target) return null;
    return (parts || []).find(function (part) {
      var values = [
        part.uid,
        part.title,
        part.path && part.path.join(" / "),
        localizeText(partTitle(part), "lv")
      ];
      return values.some(function (item) {
        return normalizeCategoryKey(item) === target;
      });
    }) || null;
  }

  function renderParts(root, data, state) {
    var mount = root.querySelector("[data-bf-parts]");
    if (!mount) return;
    var sourceParts = state.parts && state.parts.length ? state.parts : Array.isArray(data.parts) ? data.parts : [];
    var parts = sourceParts.filter(function (part) {
      return !part.root && !part.hideonpublic;
    });
    if (!parts.length) {
      mount.hidden = true;
      mount.innerHTML = "";
      return;
    }
    var limit = Number(mount.getAttribute("data-bf-parts-limit") || root.getAttribute("data-bf-parts-limit") || DEFAULT_PARTS_LIMIT);
    var expanded = mount.getAttribute("data-bf-parts-expanded") === "true";
    var extraCount = limit > 0 ? Math.max(parts.length - limit, 0) : 0;
    var buttons = ['<button class="bf-store-part' + (!state.activePartUid ? " is-active" : "") + '" type="button" data-part="" data-bf-i18n-text="Visi">' + escapeHtml(localizeText("Visi")) + "</button>"];
    parts.forEach(function (part, index) {
      var title = partTitle(part);
      var isExtra = limit > 0 && index >= limit;
      var className = "bf-store-part" +
        (String(part.uid) === String(state.activePartUid) ? " is-active" : "") +
        (isExtra ? " bf-store-part_extra" : "") +
        (isExtra && !expanded ? " is-hidden" : "");
      buttons.push(
        '<button class="' + className + '" type="button" data-part="' + escapeHtml(String(part.uid)) + '" data-bf-i18n-text="' + escapeHtml(title) + '">' +
          escapeHtml(localizeText(title)) +
          "</button>"
      );
    });
    if (extraCount) {
      buttons.push(
        '<button class="bf-store-part bf-store-part_more" type="button" data-bf-parts-toggle>' +
          (expanded
            ? '<span data-bf-i18n-text="Mazāk sadaļu">' + escapeHtml(localizeText("Mazāk sadaļu")) + "</span>"
            : '<span data-bf-i18n-text="Vairāk sadaļu">' + escapeHtml(localizeText("Vairāk sadaļu")) + "</span> <span>" + escapeHtml(String(extraCount)) + "</span>") +
          "</button>"
      );
    }
    mount.innerHTML = buttons.join("");
    applyCurrentLanguage(mount);
    mount.hidden = false;
    mount.onclick = function (event) {
      var toggle = event.target.closest("[data-bf-parts-toggle]");
      if (toggle) {
        mount.setAttribute("data-bf-parts-expanded", expanded ? "false" : "true");
        renderParts(root, data, state);
        return;
      }
      var button = event.target.closest("[data-part]");
      if (!button) return;
      var nextPartUid = button.getAttribute("data-part");
      if (state.activePartUid === nextPartUid && state.products.length) return;
      state.activePartUid = nextPartUid;
      state.slice = 1;
      state.nextSlice = "";
      load(root, state, false);
    };
  }

  function productMatchesPart(product, partUid) {
    if (!partUid) return true;
    return getPartUids(product).map(String).indexOf(String(partUid)) !== -1;
  }

  function normalizeText(value) {
    return String(value || "").toLowerCase().trim();
  }

  function productMatchesQuery(product, query) {
    if (!query) return true;
    var haystack = [
      product.title,
      product.descr,
      product.text,
      product.sku
    ].map(normalizeText).join(" ");
    return haystack.indexOf(query) !== -1;
  }

  function productText(product) {
    var characteristics = Array.isArray(product.characteristics) ? product.characteristics : [];
    return [
      product.title,
      product.descr,
      product.text,
      product.sku,
      product.mark,
      product.badge,
      characteristics.map(function (item) {
        return [item.title, item.value, item.name].join(" ");
      }).join(" ")
    ].map(normalizeText).join(" ");
  }

  function productHasAnyWord(product, words) {
    var text = productText(product);
    return words.some(function (word) {
      return text.indexOf(word) !== -1;
    });
  }

  function productHasDiscount(product) {
    var edition = firstAvailableEdition(product);
    var price = normalizePrice(edition.price != null && edition.price !== "" ? edition.price : product.price);
    var oldPrice = normalizePrice(edition.priceold || product.priceold || "");
    if (!oldPrice) return false;
    if (!price) return true;
    return Number(oldPrice) > Number(price);
  }

  function productIsOffer(product) {
    return productHasDiscount(product) || productHasAnyWord(product, ["акц", "скид", "sale", "discount", "offer"]);
  }

  function productIsNew(product) {
    return productHasAnyWord(product, ["новин", "new", "fresh", "jaun"]);
  }

  function productsByMode(products, state) {
    var list = products || [];
    if (state.mode === "offers") {
      var offers = list.filter(productIsOffer);
      list = offers.length ? offers : list.slice(0, state.limit || 12);
    } else if (state.mode === "new") {
      var newest = list.filter(productIsNew);
      list = newest.length ? newest : list.slice(0, state.limit || 12);
    }
    if (state.limit && list.length > state.limit) {
      list = list.slice(0, state.limit);
    }
    return list;
  }

  function productPrice(product) {
    var edition = firstAvailableEdition(product);
    var price = edition.price != null && edition.price !== "" ? edition.price : product.price;
    var number = Number(String(price || "0").replace(",", "."));
    return Number.isFinite(number) ? number : 0;
  }

  function sortProducts(products, sort) {
    var list = products.slice();
    if (sort === "price:asc") {
      list.sort(function (a, b) {
        return productPrice(a) - productPrice(b);
      });
    } else if (sort === "price:desc") {
      list.sort(function (a, b) {
        return productPrice(b) - productPrice(a);
      });
    } else if (sort === "title:asc") {
      list.sort(function (a, b) {
        return String(a.title || "").localeCompare(String(b.title || ""));
      });
    } else if (sort === "title:desc") {
      list.sort(function (a, b) {
        return String(b.title || "").localeCompare(String(a.title || ""));
      });
    }
    return list;
  }

  function renderProducts(root, products, state) {
    var mount = root.querySelector("[data-bf-products]");
    if (!mount) return;
    var query = normalizeText(state.query);
    var visible = sortProducts(productsByMode(products, state).filter(function (product) {
      return productMatchesPart(product, state.activePartUid) && productMatchesQuery(product, query);
    }), state.sort);
    if (!visible.length) {
      var emptyMessage = state.emptyMessage || "Preces nav atrastas.";
      mount.innerHTML = '<div class="bf-products__status" data-bf-i18n-text="' + escapeHtml(emptyMessage) + '">' + escapeHtml(localizeText(emptyMessage)) + "</div>";
      return;
    }
    mount.innerHTML = visible.map(function (product) {
      return productCardHtml(product, state.currency);
    }).join("");
    bindEditionControls(mount, state.currency);
    applyCurrentLanguage(mount);
  }

  function productCardHtml(product, currency) {
    var edition = firstAvailableEdition(product);
    var options = getEditionOptions(product);
    var image = getProductImage(product, edition);
    var price = edition.price != null && edition.price !== "" ? edition.price : product.price;
    var priceOld = edition.priceold || product.priceold || "";
    var soldOut = !isAvailable(edition);
    var partUids = getPartUids(product).join(",");
    var url = product.url || "#";
    var sku = edition.sku || product.sku || "";
    var optionHtml = options.map(function (option) {
      var selectedValue = edition[option.title] || option.values[0] || "";
      var values = unique(option.values);
      if (!values.length) return "";
      return (
        '<label class="bf-product__select js-product-edition-option" data-edition-option-id="' + escapeHtml(option.title) + '">' +
          '<span class="js-product-edition-option-name">' + escapeHtml(option.title) + "</span>" +
          '<select class="js-product-edition-option-variants">' +
            values.map(function (value) {
              var matched = findEditionBySelections(product, (function () {
                var obj = {};
                obj[option.title] = value;
                return obj;
              })());
              var selected = value === selectedValue ? " selected" : "";
              return '<option value="' + escapeHtml(value) + '" data-product-edition-variant-price="' + escapeHtml(normalizePrice(matched.price)) + '"' + selected + ">" + escapeHtml(value) + "</option>";
            }).join("") +
          "</select>" +
        "</label>"
      );
    }).join("");

    return (
      '<article class="bf-product js-product t-item' + (soldOut ? " is-soldout" : "") + '"' +
        ' data-product-lid="' + escapeHtml(edition.uid || product.uid) + '"' +
        ' data-product-uid="' + escapeHtml(edition.uid || product.uid) + '"' +
        ' data-product-gen-uid="' + escapeHtml(product.uid) + '"' +
        ' data-product-url="' + escapeHtml(url) + '"' +
        ' data-product-img="' + escapeHtml(image) + '"' +
        ' data-product-inv="' + escapeHtml(edition.quantity || "") + '"' +
        ' data-product-pack-label="' + escapeHtml(product.pack_label || "") + '"' +
        ' data-product-pack-m="' + escapeHtml(product.pack_m || "") + '"' +
        ' data-product-pack-x="' + escapeHtml(product.pack_x || "") + '"' +
        ' data-product-pack-y="' + escapeHtml(product.pack_y || "") + '"' +
        ' data-product-pack-z="' + escapeHtml(product.pack_z || "") + '"' +
        ' data-product-part-uid="' + escapeHtml(partUids) + '"' +
        ' data-bf-product="' + escapeHtml(JSON.stringify(product)) + '"' +
      ">" +
        '<a class="bf-product__image-link js-product-link" href="' + escapeHtml(url) + '">' +
          '<img class="bf-product__image js-product-img" src="' + escapeHtml(image) + '" data-original="' + escapeHtml(image) + '" alt="' + escapeHtml(product.title) + '" />' +
        "</a>" +
        '<span class="bf-product__badge" aria-hidden="true">+</span>' +
        '<div class="bf-product__body">' +
          '<h3 class="bf-product__title js-product-name">' + escapeHtml(product.title) + "</h3>" +
          '<div class="bf-product__price-row">' +
            '<span class="bf-product__price js-product-price" data-product-price-def="' + escapeHtml(normalizePrice(price)) + '" data-product-price-def-str="' + escapeHtml(normalizePrice(price)) + '">' + escapeHtml(money(price, currency)) + "</span>" +
            (priceOld ? '<span class="bf-product__price-old js-store-prod-price-old-val">' + escapeHtml(money(priceOld, currency)) + "</span>" : "") +
          "</div>" +
          (sku ? '<span class="bf-product__sku js-store-prod-sku" hidden>' + escapeHtml(sku) + "</span>" : "") +
          '<div class="bf-product__options js-product-controls-wrapper">' + optionHtml + "</div>" +
          '<div class="bf-product__actions">' +
            '<a class="bf-product__details" href="' + escapeHtml(url) + '" data-bf-i18n-text="Vairāk">' + escapeHtml(localizeText("Vairāk")) + "</a>" +
            '<a class="bf-product__cart" href="#order" aria-label="' + escapeHtml(localizeText("Pievienot grozam")) + '" data-bf-i18n-aria-label="Pievienot grozam">' + (soldOut ? "×" : "+") + "</a>" +
          "</div>" +
        "</div>" +
      "</article>"
    );
  }

  function bindEditionControls(mount, currency) {
    toArray(mount.querySelectorAll(".bf-product")).forEach(function (card) {
      var data = card.getAttribute("data-bf-product");
      var product = parseJson(data, null);
      if (!product) return;
      toArray(card.querySelectorAll(".js-product-edition-option-variants")).forEach(function (select) {
        select.addEventListener("change", function () {
          var selections = {};
          toArray(card.querySelectorAll(".js-product-edition-option")).forEach(function (optionEl) {
            var name = optionEl.getAttribute("data-edition-option-id");
            var value = optionEl.querySelector("select").value;
            selections[name] = value;
          });
          updateCardEdition(card, product, findEditionBySelections(product, selections), currency);
        });
      });
      bindProductCardCartButton(card);
    });
  }

  function updateCardEdition(card, product, edition, currency) {
    var image = getProductImage(product, edition);
    var price = edition.price != null && edition.price !== "" ? edition.price : product.price;
    var priceEl = card.querySelector(".js-product-price");
    var imgEl = card.querySelector(".js-product-img");
    var skuEl = card.querySelector(".js-store-prod-sku");
    card.setAttribute("data-product-lid", edition.uid || product.uid);
    card.setAttribute("data-product-uid", edition.uid || product.uid);
    card.setAttribute("data-product-img", image);
    card.setAttribute("data-product-inv", edition.quantity || "");
    card.classList.toggle("is-soldout", !isAvailable(edition));
    if (imgEl) {
      imgEl.src = image;
      imgEl.setAttribute("data-original", image);
    }
    if (priceEl) {
      priceEl.textContent = money(price, currency);
      priceEl.setAttribute("data-product-price-def", normalizePrice(price));
      priceEl.setAttribute("data-product-price-def-str", normalizePrice(price));
    }
    if (skuEl) {
      skuEl.textContent = edition.sku || product.sku || "";
    }
  }

  function bindProductCardCartButton(card) {
    var button = card && card.querySelector('.bf-product__cart[href="#order"]');
    if (!card || !button || button.getAttribute("data-bf-card-cart-bound") === "true") return;
    button.setAttribute("data-bf-card-cart-bound", "true");
    button.addEventListener("click", function (event) {
      event.preventDefault();
      event.stopPropagation();
      if (card.classList.contains("is-soldout")) return;
      var productData = collectTildaProductData(card);
      var finish = function () {
        syncCustomCartCounter();
        button.classList.add("is-added");
        setTimeout(function () {
          button.classList.remove("is-added");
        }, 700);
      };
      var addProduct = function () {
        try {
          if (typeof window.tcart__addProduct !== "function") throw new Error("No native cart add");
          window.tcart__addProduct(productData);
        } catch (error) {
          addProductToLocalTcart(productData);
        }
        finish();
        setTimeout(function () {
          tryOpenNativeCart();
        }, 80);
      };
      ensureNativeTildaCart().then(addProduct).catch(function () {
        addProductToLocalTcart(productData);
        finish();
      });
    });
  }

  function bindCategoryShortcuts(root, state) {
    toArray(root.querySelectorAll("[data-bf-category]")).forEach(function (link) {
      if (link.getAttribute("data-bf-category-bound") === "true") return;
      link.setAttribute("data-bf-category-bound", "true");
      link.addEventListener("click", function () {
        var part = findPartByCategory(state.parts, link.getAttribute("data-bf-category"));
        if (part) {
          state.activePartUid = String(part.uid);
          state.slice = 1;
          state.nextSlice = "";
          load(root, state, false);
        }
      });
    });
  }

  function bindLocalDemoCart(root) {
    root.addEventListener("click", function (event) {
      var trigger = event.target.closest('.bf-product__cart[href="#order"]');
      if (!trigger || typeof window.tcart__addProduct === "function") return;
      event.preventDefault();
      var count = root.querySelector("[data-bf-cart-count]");
      var current = Number(count && count.textContent || 0) + 1;
      if (count) {
        count.textContent = String(current);
      }
    });
  }

  function bindCatalogControls(root, state) {
    var search = root.querySelector("[data-bf-search]");
    var sort = root.querySelector("[data-bf-sort]");
    if (search) {
      search.addEventListener("input", function () {
        state.query = search.value;
        renderProducts(root, state.products, state);
      });
    }
    if (sort) {
      sort.addEventListener("change", function () {
        state.sort = sort.value;
        renderProducts(root, state.products, state);
      });
    }
  }

  function applyCatalogData(root, state, data, append) {
    var products = Array.isArray(data.products) ? data.products : [];
    if (Array.isArray(data.parts) && data.parts.length) {
      state.parts = data.parts;
    }
    if (!append && state.requestedCategory && !state.activePartUid) {
      var requestedPart = findPartByCategory(state.parts, state.requestedCategory);
      if (requestedPart) {
        state.activePartUid = String(requestedPart.uid);
        state.requestedCategory = "";
        state.slice = 1;
        state.nextSlice = "";
        load(root, state, false);
        return;
      }
    }
    state.products = append ? state.products.concat(products) : products;
    state.nextSlice = data.nextslice || "";
    renderParts(root, data, state);
    bindCategoryShortcuts(root, state);
    renderProducts(root, state.products, state);
    var more = root.querySelector("[data-bf-load-more]");
    if (more) more.hidden = !state.nextSlice;
  }

  function load(root, state, append) {
    var mount = root.querySelector("[data-bf-products]");
    if (!append && mount) {
      mount.innerHTML = '<div class="bf-products__status" data-bf-i18n-text="Ielādējam preces...">' + escapeHtml(localizeText("Ielādējam preces...")) + "</div>";
    }
    requestJson(buildApiUrl(root, state, state.slice))
      .then(function (data) {
        applyCatalogData(root, state, data, append);
      })
      .catch(function (error) {
        var fallback = getLocalFallbackData();
        if (fallback) {
          applyCatalogData(root, state, fallback, false);
          return;
        }
        if (mount) {
          mount.innerHTML = '<div class="bf-products__error" data-bf-i18n-text="Neizdevās ielādēt preces. Lūdzu, mēģiniet vēlreiz.">' + escapeHtml(localizeText("Neizdevās ielādēt preces. Lūdzu, mēģiniet vēlreiz.")) + "</div>";
        }
        console.error(error);
      });
  }

  function init(root) {
    if (root.getAttribute("data-bf-initialized") === "true") return;
    root.setAttribute("data-bf-initialized", "true");
    var state = {
      activePartUid: "",
      currency: root.getAttribute("data-currency") || DEFAULT_CURRENCY,
      nextSlice: "",
      emptyMessage: root.getAttribute("data-bf-empty-message") || "",
      limit: Number(root.getAttribute("data-products-limit") || 0),
      mode: root.getAttribute("data-bf-product-mode") || "",
      parts: [],
      products: [],
      query: "",
      requestedCategory: "",
      rootPartUid: root.getAttribute("data-storepartuid") || "",
      sort: "",
      slice: 1
    };
    state.activePartUid = root.getAttribute("data-bf-default-partuid") || "";
    state.requestedCategory = requestedCategoryKey(root);
    var more = root.querySelector("[data-bf-load-more]");
    if (more) {
      more.addEventListener("click", function () {
        if (!state.nextSlice) return;
        state.slice = state.nextSlice;
        load(root, state, true);
      });
    }
    bindLocalDemoCart(root);
    bindCatalogControls(root, state);
    if (root.querySelector("[data-bf-products]")) {
      load(root, state, false);
    }
  }

  function initAll() {
    toArray(document.querySelectorAll("[data-bf-app]")).forEach(init);
  }

  function boot() {
    renderCommonChrome();
    ensureTildaProductPage();
    bindLanguageSwitcher();
    bindStickyHeader();
    bindMobileMenu();
    bindCartBridge();
    bindDeliveryMapObserver();
    initAll();
    ensureAllDeliveryMapZoomControls();
    [250, 900, 1800].forEach(function (delay) {
      setTimeout(ensureAllDeliveryMapZoomControls, delay);
    });
  }

  ready(boot);
  window.addEventListener("brokolisfarm:block-ready", boot);
  window.BrokolisFarmTilda = {
    boot: boot,
    initAll: initAll
  };
})();

</script>
