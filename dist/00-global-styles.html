<style id="brokolisfarm-global-styles">
:root {
  --bf-green: #6dac4a;
  --bf-text: #2e2e39;
  --bf-muted: #f9f8fc;
  --bf-soft: #ececec;
  --bf-border: #d9d9d9;
  --bf-shell: 1160px;
  --bf-radius: 10px;
  --bf-header-height: 110px;
  --bf-font: "Ubuntu", Arial, sans-serif;
  --bf-accent-font: "Comfortaa", "Ubuntu", Arial, sans-serif;
}

* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
  scroll-padding-top: 126px;
}

body {
  margin: 0;
  background: #ffffff;
  color: var(--bf-text);
  font-family: var(--bf-font);
}

.t706__carticon,
.t706__carticon:not([class*="t-menuwidgeticons__button_hidden"]),
.t985__search-widget-button,
.t985__search-widget-button:not([class*="t-menuwidgeticons__button_hidden"]),
.t-search-widget__button,
.t1002__wishlisticon,
.t1002__wishlisticon:not([class*="t-menuwidgeticons__button_hidden"]) {
  display: none !important;
  opacity: 0 !important;
  pointer-events: none !important;
  visibility: hidden !important;
}

.bf-page {
  background: #ffffff;
  color: var(--bf-text);
  font-family: var(--bf-font);
  min-width: 320px;
  padding-top: var(--bf-header-height);
}

.bf-page a {
  color: inherit;
  text-decoration: none;
}

.bf-page img {
  display: block;
  max-width: 100%;
}

.bf-page [id] {
  scroll-margin-top: 126px;
}

.bf-loader-screen {
  align-items: center;
  background: #ffffff;
  color: var(--bf-text);
  display: flex;
  justify-content: center;
  min-height: 320px;
  padding: 64px 20px;
}

.bf-loader-card {
  align-items: center;
  display: grid;
  gap: 16px;
  justify-items: center;
  max-width: 360px;
  width: 100%;
}

.bf-loader-logo {
  align-items: center;
  animation: bfLoaderBlink 1s ease-in-out infinite;
  background: var(--bf-green);
  border-radius: 12px;
  box-shadow: 0 16px 36px rgba(109, 172, 74, 0.24);
  color: #ffffff;
  display: inline-flex;
  font-family: var(--bf-accent-font);
  font-size: 34px;
  font-weight: 600;
  height: 68px;
  justify-content: center;
  width: 68px;
}

.bf-loader-label {
  font-size: 14px;
  font-weight: 500;
  text-align: center;
}

.bf-loader-track {
  background: var(--bf-soft);
  border-radius: 999px;
  height: 8px;
  overflow: hidden;
  width: 100%;
}

.bf-loader-bar {
  background: var(--bf-green);
  border-radius: inherit;
  display: block;
  height: 100%;
  transition: width 0.18s ease;
  width: 0;
}

.bf-loader-percent {
  color: var(--bf-green);
  font-family: var(--bf-accent-font);
  font-size: 13px;
  font-weight: 600;
}

.bf-loader-status {
  background: var(--bf-muted);
  border-radius: var(--bf-radius);
  margin: 48px 0;
  padding: 28px;
}

.bf-loader-status_error {
  color: #9f2727;
}

@keyframes bfLoaderBlink {
  0%,
  100% {
    opacity: 1;
    transform: scale(1);
  }

  50% {
    opacity: 0.42;
    transform: scale(0.94);
  }
}

.bf-shell {
  margin: 0 auto;
  max-width: var(--bf-shell);
  width: calc(100% - 40px);
}

.bf-header {
  background: #ffffff;
  color: var(--bf-text);
  left: 0;
  position: fixed;
  right: 0;
  top: 0;
  transition: box-shadow 0.22s ease;
  width: 100%;
  z-index: 99990;
}

.bf-header a {
  color: inherit;
  text-decoration: none;
}

.bf-header a:hover {
  color: var(--bf-green);
}

.bf-header.is-scrolled {
  box-shadow: 0 12px 30px rgba(46, 46, 57, 0.1);
}

.bf-topbar {
  background: var(--bf-muted);
  font-size: 14px;
  font-weight: 300;
}

.bf-topbar__inner {
  align-items: center;
  display: flex;
  gap: 28px;
  height: 30px;
}

.bf-phone {
  margin-left: auto;
}

.bf-language {
  align-items: center;
  display: inline-flex;
  gap: 7px;
}

.bf-language__label {
  color: rgba(46, 46, 57, 0.72);
}

.bf-language__button {
  background: #ffffff;
  border: 1px solid rgba(109, 172, 74, 0.28);
  border-radius: 999px;
  color: var(--bf-text);
  cursor: pointer;
  font: inherit;
  font-size: 12px;
  font-weight: 500;
  height: 22px;
  min-width: 34px;
  padding: 0 8px;
}

.bf-language__button.is-active {
  background: var(--bf-green);
  border-color: var(--bf-green);
  color: #ffffff;
}

.bf-nav {
  align-items: center;
  border-bottom: 1px solid var(--bf-border);
  display: grid;
  gap: 20px;
  grid-template-columns: auto auto 1fr auto auto;
  height: 80px;
}

.bf-logo {
  align-items: center;
  display: inline-flex;
  gap: 8px;
  min-width: 160px;
}

.bf-logo__mark {
  align-items: center;
  background: var(--bf-green);
  border-radius: 6px;
  color: #fff;
  display: inline-flex;
  font-family: var(--bf-accent-font);
  font-size: 18px;
  font-weight: 600;
  height: 30px;
  justify-content: center;
  width: 30px;
}

.bf-logo__text {
  font-family: var(--bf-accent-font);
  font-size: 18px;
  font-weight: 600;
}

.bf-catalog-button,
.bf-button,
.bf-load-more,
.bf-newsletter__form button {
  align-items: center;
  border: 0;
  border-radius: 7px;
  cursor: pointer;
  display: inline-flex;
  font-family: var(--bf-accent-font);
  font-size: 16px;
  font-weight: 600;
  justify-content: center;
  min-height: 40px;
  padding: 10px 18px;
  transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
}

.bf-catalog-button,
.bf-button,
.bf-newsletter__form button {
  background: var(--bf-green);
  color: #ffffff;
}

.bf-header .bf-catalog-button,
.bf-header .bf-catalog-button:hover {
  color: #ffffff;
}

.bf-button_light {
  background: #ffffff;
  color: var(--bf-text);
}

.bf-catalog-button:hover,
.bf-button:hover,
.bf-load-more:hover,
.bf-newsletter__form button:hover,
.bf-product__cart:hover,
.bf-product__details:hover {
  transform: translateY(-1px);
}

.bf-catalog-button__icon,
.bf-icon-search,
.bf-icon-cart {
  display: inline-block;
  position: relative;
}

.bf-catalog-button__icon {
  border-bottom: 2px solid currentColor;
  border-top: 2px solid currentColor;
  height: 14px;
  margin-right: 10px;
  width: 16px;
}

.bf-catalog-button__icon::before {
  background: currentColor;
  content: "";
  height: 2px;
  left: 0;
  position: absolute;
  top: 4px;
  width: 16px;
}

.bf-menu {
  align-items: center;
  display: flex;
  font-size: 16px;
  gap: 32px;
  justify-content: center;
}

.bf-icon-link,
.bf-cart-link {
  align-items: center;
  cursor: pointer;
  display: inline-flex;
  height: 40px;
  justify-content: center;
  position: relative;
  width: 40px;
}

.bf-icon-search {
  border: 2px solid var(--bf-text);
  border-radius: 50%;
  height: 20px;
  width: 20px;
}

.bf-icon-search::after {
  background: var(--bf-text);
  content: "";
  height: 2px;
  position: absolute;
  right: -6px;
  top: 16px;
  transform: rotate(45deg);
  width: 9px;
}

.bf-icon-cart {
  border: 2px solid var(--bf-green);
  border-radius: 6px 6px 8px 8px;
  height: 22px;
  width: 24px;
}

.bf-icon-cart::before {
  border: 2px solid var(--bf-green);
  border-bottom: 0;
  border-radius: 12px 12px 0 0;
  content: "";
  height: 8px;
  left: 5px;
  position: absolute;
  top: -9px;
  width: 10px;
}

.bf-cart-count {
  align-items: center;
  background: var(--bf-green);
  border-radius: 50%;
  color: #fff;
  display: inline-flex;
  font-size: 11px;
  height: 18px;
  justify-content: center;
  min-width: 18px;
  padding: 0 5px;
  position: absolute;
  right: -2px;
  top: 0;
}

.bf-cart-count:empty {
  display: none;
}

.bf-cart-drawer {
  inset: 0;
  opacity: 0;
  pointer-events: none;
  position: fixed;
  transition: opacity 0.2s ease;
  z-index: 100010;
}

.bf-cart-drawer.is-open {
  opacity: 1;
  pointer-events: auto;
}

.bf-cart-drawer__backdrop {
  background: rgba(46, 46, 57, 0.36);
  border: 0;
  cursor: pointer;
  inset: 0;
  position: absolute;
}

.bf-cart-drawer__panel {
  background: #ffffff;
  box-shadow: -18px 0 40px rgba(46, 46, 57, 0.16);
  display: grid;
  gap: 18px;
  grid-template-rows: auto 1fr auto;
  height: 100%;
  margin-left: auto;
  max-width: 430px;
  padding: 22px;
  position: relative;
  transform: translateX(24px);
  transition: transform 0.2s ease;
  width: min(100%, 430px);
}

.bf-cart-drawer.is-open .bf-cart-drawer__panel {
  transform: translateX(0);
}

.bf-cart-drawer__head,
.bf-cart-drawer__total {
  align-items: center;
  display: flex;
  justify-content: space-between;
}

.bf-cart-drawer__head h2 {
  font-size: 28px;
  margin: 0;
}

.bf-cart-drawer__head button {
  background: var(--bf-muted);
  border: 0;
  border-radius: 50%;
  cursor: pointer;
  font-size: 26px;
  height: 42px;
  line-height: 1;
  width: 42px;
}

.bf-cart-drawer__items {
  display: grid;
  gap: 12px;
  overflow: auto;
}

.bf-cart-drawer__item {
  align-items: center;
  border-bottom: 1px solid var(--bf-soft);
  display: grid;
  gap: 12px;
  grid-template-columns: 58px 1fr auto;
  padding-bottom: 12px;
}

.bf-cart-drawer__item img,
.bf-cart-drawer__thumb {
  background: var(--bf-muted);
  border-radius: 10px;
  height: 58px;
  object-fit: cover;
  width: 58px;
}

.bf-cart-drawer__item strong,
.bf-cart-drawer__item span {
  display: block;
}

.bf-cart-drawer__item span {
  color: rgba(46, 46, 57, 0.62);
  font-size: 13px;
  margin-top: 4px;
}

.bf-cart-drawer__empty {
  background: var(--bf-muted);
  border-radius: 12px;
  padding: 24px;
}

.bf-cart-drawer__total {
  border-top: 1px solid var(--bf-soft);
  font-size: 18px;
  padding-top: 16px;
}

body.bf-mobile-menu-open {
  overflow: hidden;
}

.bf-mobile-menu {
  display: none;
}

.bf-hero {
  padding-top: 23px;
}

.bf-hero__panel {
  background: var(--bf-green);
  border-radius: 20px;
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(420px, 54%);
  min-height: 378px;
  overflow: hidden;
}

.bf-hero__copy {
  align-items: flex-start;
  color: #ffffff;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 34px 30px;
}

.bf-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 9px 10px;
  margin-bottom: 50px;
}

.bf-tags span {
  background: #ffffff;
  border-radius: 5px;
  color: var(--bf-green);
  font-size: 16px;
  line-height: 1;
  padding: 5px 10px;
}

.bf-hero__meta {
  display: flex;
  flex-wrap: wrap;
  font-size: 14px;
  gap: 22px;
  margin-bottom: 14px;
}

.bf-hero h1 {
  font-size: 30px;
  line-height: 1.13;
  margin: 0 0 36px;
  max-width: 380px;
}

.bf-hero .bf-button {
  align-self: flex-start;
}

.bf-hero .bf-button_light {
  color: var(--bf-text);
}

.bf-hero__media {
  min-height: 378px;
  overflow: hidden;
}

.bf-hero__media img {
  height: 100%;
  object-fit: cover;
  width: 100%;
}

.bf-section {
  padding: 60px 0 0;
}

.bf-section h2 {
  font-size: 30px;
  line-height: 1.13;
  margin: 0 0 23px;
}

.bf-category-grid {
  display: grid;
  gap: 10px;
  grid-template-columns: repeat(5, minmax(0, 1fr));
}

.bf-category-card {
  background: var(--bf-muted);
  border-radius: var(--bf-radius);
  display: grid;
  grid-template-rows: 178px minmax(72px, auto);
  min-height: 250px;
  overflow: hidden;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.bf-category-card:hover,
.bf-product:hover,
.bf-benefit:hover,
.bf-editorial-card:hover {
  box-shadow: 0 16px 36px rgba(46, 46, 57, 0.08);
  transform: translateY(-2px);
}

.bf-category-card img {
  height: 178px;
  object-fit: cover;
  width: 100%;
}

.bf-category-card span {
  align-items: center;
  display: flex;
  font-size: 18px;
  font-weight: 500;
  gap: 10px;
  justify-content: space-between;
  line-height: 1.22;
  min-height: 72px;
  overflow-wrap: anywhere;
  padding: 0 10px;
}

.bf-category-card span::after {
  color: var(--bf-green);
  content: "+";
  flex: 0 0 auto;
  font-size: 20px;
  font-weight: 700;
}

.bf-section__head {
  align-items: center;
  display: flex;
  gap: 20px;
  justify-content: space-between;
  margin-bottom: 23px;
}

.bf-section__head h2 {
  margin-bottom: 0;
}

.bf-store-parts {
  align-items: center;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: flex-end;
}

.bf-store-part {
  background: var(--bf-muted);
  border: 1px solid transparent;
  border-radius: 999px;
  color: var(--bf-text);
  cursor: pointer;
  font: inherit;
  min-height: 32px;
  padding: 6px 14px;
}

.bf-store-part.is-active {
  background: var(--bf-green);
  color: #ffffff;
}

.bf-store-part.is-hidden {
  display: none;
}

.bf-store-part_more {
  background: #ffffff;
  border-color: rgba(109, 172, 74, 0.45);
  color: var(--bf-green);
  font-weight: 500;
}

.bf-store-part_more:hover {
  border-color: var(--bf-green);
}

.bf-products {
  display: grid;
  gap: 10px;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  min-height: 220px;
}

.bf-products__status,
.bf-products__error {
  background: var(--bf-muted);
  border-radius: var(--bf-radius);
  grid-column: 1 / -1;
  padding: 28px;
}

.bf-products__error {
  color: #9f2727;
}

.bf-product {
  background: var(--bf-muted);
  border-radius: var(--bf-radius);
  display: flex;
  flex-direction: column;
  min-height: 410px;
  overflow: hidden;
  position: relative;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.bf-product__image-link {
  display: block;
  height: 220px;
}

.bf-product__image {
  height: 220px;
  object-fit: cover;
  width: 100%;
}

.bf-product__badge {
  align-items: center;
  background: rgba(255, 255, 255, 0.92);
  border-radius: 50%;
  color: var(--bf-green);
  display: inline-flex;
  font-size: 18px;
  font-weight: 700;
  height: 32px;
  justify-content: center;
  position: absolute;
  right: 10px;
  top: 10px;
  width: 32px;
}

.bf-product__body {
  display: flex;
  flex: 1;
  flex-direction: column;
  gap: 12px;
  padding: 14px 10px 10px;
}

.bf-product__title {
  font-size: 18px;
  font-weight: 400;
  line-height: 1.18;
  margin: 0;
  min-height: 42px;
}

.bf-product__price-row {
  align-items: baseline;
  display: flex;
  gap: 8px;
  min-height: 22px;
}

.bf-product__price {
  font-size: 18px;
  font-weight: 700;
}

.bf-product__price-old {
  color: #8c8c8c;
  font-size: 14px;
  text-decoration: line-through;
}

.bf-product__options {
  min-height: 0;
}

.bf-product__select {
  display: block;
}

.bf-product__select span {
  display: block;
  font-size: 12px;
  margin-bottom: 5px;
}

.bf-product__select select {
  background: #ffffff;
  border: 1px solid var(--bf-border);
  border-radius: 5px;
  color: var(--bf-text);
  font: inherit;
  height: 34px;
  padding: 0 8px;
  width: 100%;
}

.bf-product__actions {
  align-items: center;
  display: grid;
  gap: 10px;
  grid-template-columns: 1fr 32px;
  margin-top: auto;
}

.bf-product__details {
  align-items: center;
  background: var(--bf-soft);
  border-radius: 5px;
  color: var(--bf-green) !important;
  display: inline-flex;
  font-size: 16px;
  font-weight: 700;
  height: 40px;
  justify-content: center;
  text-decoration: none !important;
}

.bf-product__details:visited {
  color: var(--bf-green) !important;
}

.bf-product__details:hover {
  background: rgba(109, 172, 74, 0.16);
  color: #4f9533 !important;
}

.bf-product__cart {
  align-items: center;
  background: var(--bf-green);
  border-radius: 50%;
  color: #ffffff !important;
  display: inline-flex;
  font-size: 22px;
  font-weight: 700;
  height: 32px;
  justify-content: center;
  line-height: 1;
  text-decoration: none !important;
  width: 32px;
}

.bf-product.is-soldout .bf-product__cart {
  background: #b8b8b8;
  pointer-events: none;
}

.bf-load-more {
  background: var(--bf-muted);
  color: var(--bf-green);
  margin: 24px auto 0;
}

.bf-newsletter__intro {
  align-items: flex-start;
  display: grid;
  gap: 70px;
  grid-template-columns: minmax(320px, 443px) 1fr;
}

.bf-newsletter__intro p,
.bf-about-text {
  font-size: 14px;
  font-weight: 300;
  line-height: 1.45;
  margin: 8px 0 0;
}

.bf-newsletter__panel {
  align-items: center;
  background: var(--bf-green);
  border-radius: 10px;
  color: #ffffff;
  display: grid;
  grid-template-columns: 300px 1fr 300px;
  margin-top: 57px;
  min-height: 395px;
  overflow: hidden;
}

.bf-newsletter__image {
  height: 100%;
  object-fit: cover;
  width: 100%;
}

.bf-newsletter__form {
  display: grid;
  gap: 17px;
  justify-items: center;
  padding: 30px;
  text-align: center;
}

.bf-newsletter__form h3 {
  font-size: 30px;
  line-height: 1.13;
  margin: 0;
  max-width: 440px;
}

.bf-newsletter__form input {
  border: 0;
  border-radius: 999px;
  color: var(--bf-text);
  font: inherit;
  height: 50px;
  max-width: 310px;
  padding: 0 24px;
  width: 100%;
}

.bf-newsletter__form button {
  background: #ffffff;
  border-radius: 999px;
  color: var(--bf-green);
  max-width: 310px;
  width: 100%;
}

.bf-about-text {
  margin: 0 auto 57px;
  max-width: 664px;
  text-align: left;
}

.bf-delivery__card {
  border-radius: 20px;
  min-height: 395px;
  overflow: hidden;
  position: relative;
}

.bf-delivery__card > img {
  height: 395px;
  object-fit: cover;
  width: 100%;
}

.bf-delivery__overlay {
  align-items: end;
  background: linear-gradient(90deg, rgba(0, 0, 0, 0.52), rgba(0, 0, 0, 0.14));
  color: #ffffff;
  display: grid;
  gap: 40px;
  grid-template-columns: minmax(260px, 450px) minmax(260px, 1fr);
  inset: 0;
  padding: 30px;
  position: absolute;
}

.bf-delivery__overlay h2 {
  margin: 0;
}

.bf-delivery__overlay ol {
  counter-reset: item;
  display: grid;
  gap: 12px;
  list-style: none;
  margin: 0;
  padding: 0 0 10px;
}

.bf-delivery__overlay li {
  font-size: 16px;
}

.bf-delivery__overlay li::before {
  content: "0" counter(item);
  counter-increment: item;
  display: inline-block;
  font-weight: 700;
  margin-right: 12px;
}

.bf-benefit-grid {
  display: grid;
  gap: 40px;
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.bf-benefit {
  background: var(--bf-muted);
  border-radius: var(--bf-radius);
  display: flex;
  flex-direction: column;
  gap: 92px;
  min-height: 233px;
  padding: 20px 10px;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.bf-benefit span {
  align-self: flex-start;
  background: var(--bf-green);
  border-radius: 7px;
  color: #ffffff;
  font-size: 14px;
  font-weight: 500;
  padding: 7px 18px;
}

.bf-benefit p {
  font-size: 14px;
  font-weight: 300;
  line-height: 1.5;
  margin: 0;
  max-width: 300px;
}

.bf-instagram__panel {
  align-items: center;
  background: var(--bf-muted);
  border-radius: 20px;
  display: grid;
  grid-template-columns: minmax(300px, 443px) minmax(320px, 1fr);
  min-height: 395px;
  overflow: hidden;
  padding: 42px 30px 0;
}

.bf-instagram h2 {
  margin-bottom: 23px;
}

.bf-instagram p {
  font-size: 16px;
  font-weight: 300;
  line-height: 1.25;
  margin: 0 0 32px;

}

.bf-phone-preview {
  height: 352px;
  justify-self: center;
  position: relative;
  width: 363px;
}

.bf-phone-preview__screen {
  border-radius: 30px;
  height: 310px;
  left: 34px;
  object-fit: cover;
  position: absolute;
  top: 24px;
  width: 295px;
}

.bf-phone-preview__frame {
  height: 100%;
  inset: 0;
  object-fit: contain;
  position: absolute;
  width: 100%;
}

.bf-editorial__grid {
  display: grid;
  gap: 40px;
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.bf-editorial-card {
  align-items: center;
  border-radius: 20px;
  display: grid;
  min-height: 395px;
  overflow: hidden;
  place-items: center;
  position: relative;
  text-align: center;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.bf-editorial-card img {
  height: 100%;
  inset: 0;
  object-fit: cover;
  position: absolute;
  width: 100%;
}

.bf-editorial-card::after {
  background: rgba(255, 255, 255, 0.78);
  border-radius: 45% 55% 48% 52%;
  content: "";
  height: 220px;
  position: absolute;
  width: 330px;
}

.bf-editorial-card > div {
  max-width: 300px;
  position: relative;
  z-index: 1;
}

.bf-editorial-card h2 {
  margin-bottom: 14px;
}

.bf-editorial-card p {
  font-size: 16px;
  font-weight: 300;
  line-height: 1.25;
  margin: 0 0 20px;
}

.bf-page-hero {
  background: linear-gradient(180deg, #ffffff 0%, var(--bf-muted) 100%);
  padding: 58px 0 64px;
}

.bf-page-hero__inner {
  align-items: center;
  display: grid;
  min-height: 240px;
}

.bf-page-hero h1 {
  font-size: 42px;
  line-height: 1.08;
  margin: 10px 0 18px;
  max-width: 680px;
}

.bf-page-hero p {
  font-size: 18px;
  font-weight: 300;
  line-height: 1.45;
  margin: 0;
  max-width: 660px;
}

.bf-page-hero_center {
  text-align: center;
}

.bf-page-hero_center .bf-page-hero__inner,
.bf-page-hero_center h1,
.bf-page-hero_center p {
  justify-items: center;
  margin-left: auto;
  margin-right: auto;
}

.bf-page-hero__actions {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 26px;
}

.bf-page-hero__stats {
  display: grid;
  gap: 10px;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  margin-top: 34px;
  max-width: 680px;
}

.bf-page-hero__stat {
  background: #ffffff;

  border-radius: 10px;
  padding: 16px;
}

  color: var(--bf-green);

  font-family: var(--bf-accent-font);
  font-size: 24px;
  margin-bottom: 4px;
}

.bf-page-hero__stat span {
  font-size: 14px;
  font-weight: 300;
  line-height: 1.35;
}

.bf-kicker {

.bf-products_catalog {

.bf-quote-band span {

.bf-product-page-note {

.bf-info-card,

}

.bf-info-card p,
.bf-contact-list p,

.bf-contact-list {

.bf-contact-form {

.bf-delivery-zone__head {

.bf-delivery-zone__address {

.bf-delivery-zone__address-wrap {

.bf-delivery-zone__address span {

.bf-delivery-zone__address input {

}

.bf-delivery-zone__suggestions {
  background: #ffffff;
  border: 1px solid rgba(46, 46, 57, 0.12);
  border-radius: 8px;
  box-shadow: 0 12px 28px rgba(46, 46, 57, 0.12);
  display: grid;
  max-height: 210px;
  overflow: auto;
  z-index: 6;
}

.bf-delivery-zone__suggestions[hidden] {

}

.bf-delivery-zone__suggestions button,
.bf-delivery-zone__suggestion-empty,
.bf-delivery-zone__hint {

}

.bf-delivery-zone__suggestions button {
  background: #ffffff;
  border: 0;
  border-bottom: 1px solid rgba(46, 46, 57, 0.08);
  color: var(--bf-text);
  cursor: pointer;
  font-size: 13px;
  line-height: 1.35;
  padding: 10px 12px;
  text-align: left;
}

.bf-delivery-zone__suggestions button:hover {
  background: rgba(109, 172, 74, 0.08);
}

.bf-delivery-zone__suggestion-empty {
  color: rgba(46, 46, 57, 0.62);
  font-size: 13px;
  padding: 10px 12px;
}

.bf-delivery-zone__hint {
  color: rgba(46, 46, 57, 0.62);
  font-size: 12px;
  font-weight: 300;
  line-height: 1.35;
  margin: 0;
}

.bf-delivery-zone__hint.is-ok {
  color: var(--bf-green);
  font-weight: 600;
}

.bf-delivery-zone__hint.is-error {
  color: #b45309;
  font-weight: 600;
}

.bf-delivery-zone__hint.is-loading {
  color: rgba(46, 46, 57, 0.72);
}

.bf-delivery-map-svg {
  display: block;
  height: 100%;
  width: 100%;
}

.bf-delivery-map-svg text {
  fill: rgba(46, 46, 57, 0.7);
  font-family: var(--bf-font);
  font-size: 7px;
  font-weight: 700;
}

.bf-delivery-map-svg__zone {
  cursor: pointer;
  fill-opacity: 0.18;
  stroke-linejoin: round;
  stroke-width: 2;
  transition: fill-opacity 0.18s ease, stroke-width 0.18s ease;
}

.bf-delivery-map-svg__zone.is-active {
  fill-opacity: 0.34;
  stroke-width: 3;
}

.bf-delivery-map-svg__point {
  fill: #ffffff;
  stroke: var(--bf-green);
  stroke-width: 2;
}
